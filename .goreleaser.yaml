# .goreleaser.yaml configuration for NBP CLI tool
version: 2

project_name: nbp

before:
  hooks:
    - go mod tidy
    - go build -o nbp main.go
    - mkdir -p completions
    - ./nbp completion bash > completions/nbp.bash
    - ./nbp completion zsh > completions/nbp.zsh
    - ./nbp completion fish > completions/nbp.fish
    - rm nbp

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    main: ./main.go
    binary: nbp

archives:
  - formats:
      - tar.gz
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - LICENSE.txt
      - README.md
      - completions/*

homebrew:
  - repository:
      owner: MarcusSlover
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/MarcusSlover/nbp-cli"
    description: "NBP Exchange Rate CLI tool"
    license: "MIT"
    install: |
      bin.install "nbp"
      bash_completion.install "completions/nbp.bash" => "nbp"
      zsh_completion.install "completions/nbp.zsh" => "_nbp"
      fish_completion.install "completions/nbp.fish"

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

snapshot:
  version_template: "{{ incpatch .Version }}-next"
